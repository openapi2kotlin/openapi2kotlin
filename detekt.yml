build:
    maxIssues: 0

config:
    validation: true
    warningsAsErrors: true

complexity:
    LongParameterList:
        ignoreAnnotated:
            - Resource
    TooManyFunctions:
        active: false

coroutines:
    SuspendFunSwallowedCancellation:
        active: true

naming:
    PackageNaming:
        active: false

style:
    MaxLineLength:
        maxLineLength: 120

hexagonalArchitecture:
    CoreImportBoundary:
        active: true
    SuffixAwareTooManyFunctions:
        active: true
        defaultThreshold: 11
        relaxedThreshold: 30
        relaxedSuffixes:
            - Controller
            - ApiImpl
            - Api
    TopLevelFunctionFileName:
        active: true
    UnusedTopLevelDeclaration:
        active: true
    UnusedTopLevelFunction:
        active: true
    UsecaseDtoSuffix:
        active: true
