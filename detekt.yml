build:
    maxIssues: 0

config:
    validation: true
    warningsAsErrors: true

complexity:
    LongParameterList:
        ignoreAnnotated:
            - Resource

coroutines:
    SuspendFunSwallowedCancellation:
        active: true

naming:
    PackageNaming:
        active: false

style:
    MaxLineLength:
        maxLineLength: 120
